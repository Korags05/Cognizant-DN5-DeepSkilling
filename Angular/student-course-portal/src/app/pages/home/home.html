<h1>{{ portalName }}</h1>

<p>
  Manage your courses, enrollment and academic progress.
</p>

<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">

  Enroll Now

</button>

<p>{{ message }}</p>

<br>

<input
  type="text"
  [(ngModel)]="searchTerm"
  placeholder="Search course">

<p>Searching for: {{ searchTerm }}</p>

<hr>

<div>
  <p>Courses Available: 12</p>
  <p>Enrolled: 3</p>
  <p>GPA: 3.8</p>
</div>
