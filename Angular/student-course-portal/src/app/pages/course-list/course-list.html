<h2>Course List</h2>

<p *ngIf="isLoading">
  Loading courses...
</p>

<div *ngIf="!isLoading">

  <app-course-card

    *ngFor="let c of courses"

    [course]="c"

    (enrollRequested)="onEnroll($event)">

  </app-course-card>

</div>

<p *ngIf="selectedCourseId">

  Selected Course ID :

  {{selectedCourseId}}

</p>
