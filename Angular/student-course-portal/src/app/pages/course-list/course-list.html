<h2>Course List</h2>

<p *ngIf="isLoading">
  Loading courses...
</p>
<button (click)="addDummyCourse()">

  Add Dummy Course

</button>

<hr>
<div *ngIf="!isLoading">

  <app-course-card
    *ngFor="let c of courses"
    [course]="c"
    (enrollRequested)="onEnroll($event)"
    (deleteRequested)="delete($event)">
  </app-course-card>

</div>

<p *ngIf="selectedCourseId">

  Selected Course ID :

  {{selectedCourseId}}

</p>
